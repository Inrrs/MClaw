<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>MClaw - 登录</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}
.login{background:#fff;padding:40px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1);width:300px}
h1{text-align:center;color:#333;margin-bottom:30px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:4px;box-sizing:border-box}
button{width:100%;padding:12px;background:#1976d2;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px}
button:hover{background:#1565c0}
</style></head><body>
<div class="login"><h1>MClaw</h1>
<form method="POST" action="/api/auth/login">
<input type="text" name="username" placeholder="用户名" required>
<input type="password" name="password" placeholder="密码" required>
<button type="submit">登录</button>
</form></div></body></html>
